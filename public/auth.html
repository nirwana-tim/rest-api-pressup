<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication • PressUp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: #1f2a44;
            line-height: 1.6;
        }

        .outer-table {
            width: 100%;
            padding: 40px 20px;
            background: #f8fafc;
        }

        .card-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        .header {
            background: #2dd4c0;
            padding: 32px 24px;
            text-align: center;
        }

        .header img {
            width: 80px;
            height: auto;
            display: block;
            margin: 0 auto 12px;
        }

        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .content {
            padding: 40px 32px;
            text-align: center;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon {
            width: 100%;
            height: 100%;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1f2a44;
            margin: 0 0 16px;
        }

        p {
            font-size: 16px;
            color: #334155;
            margin: 0 0 28px;
        }

        .btn {
            display: inline-block;
            background: #1f2a44;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 48px;
            border-radius: 8px;
            min-width: 220px;
            text-align: center;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0f172a;
        }

        .error .btn {
            background: #ef4444;
        }

        .error .btn:hover {
            background: #dc2626;
        }

        .status.success h2,
        .status.success p {
            color: #1f2a44;
        }

        .status.error h2 {
            color: #ef4444;
        }

        .status.error p {
            color: #334155;
        }

        .footer {
            background: #f1f5f9;
            padding: 24px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        @media (max-width: 500px) {
            .card-wrapper {
                border-radius: 0;
            }

            .content {
                padding: 32px 20px;
            }

            .btn {
                min-width: 100%;
                padding: 16px 24px;
            }
        }
    </style>
</head>

<body>

    <table class="outer-table" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">

                <table class="card-wrapper" cellpadding="0" cellspacing="0">
                    <!-- Header -->
                    <tr>
                        <td class="header">
                            <img src="https://raw.githubusercontent.com/nirwana-tim/rest-api-pressup/refs/heads/main/email/icon.webp"
                                alt="PressUp Logo" />
                            <h1>PressUp</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td class="content" id="statusContent">

                            <div class="icon-container">
                                <!-- Default: spinner (akan diganti JS) -->
                                <svg class="icon spinner" id="spinner" viewBox="0 0 50 50">
                                    <circle cx="25" cy="25" r="20" fill="none" stroke="#2dd4c0" stroke-width="5"
                                        stroke-dasharray="31.4 31.4" stroke-linecap="round">
                                        <animateTransform attributeName="transform" type="rotate" from="0 25 25"
                                            to="360 25 25" dur="1s" repeatCount="indefinite" />
                                    </circle>
                                </svg>

                                <!-- Success icon -->
                                <svg class="icon" id="checkIcon" style="display:none;" viewBox="0 0 24 24" fill="none"
                                    stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>

                                <!-- Error icon -->
                                <svg class="icon" id="crossIcon" style="display:none;" viewBox="0 0 24 24" fill="none"
                                    stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </div>

                            <h2 id="title">Authenticating...</h2>
                            <p id="message">Please wait while we verify your authentication.</p>

                            <a href="pressup://auth-callback" class="btn" id="actionBtn" style="display:none;">
                                Open PressUp App
                            </a>

                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="footer">
                            © 2026 PressUp. All rights reserved.<br>
                            Karawang, Indonesia
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

    <script>
        function updateUI(isSuccess, message = '') {
            const spinner = document.getElementById('spinner');
            const check = document.getElementById('checkIcon');
            const cross = document.getElementById('crossIcon');
            const title = document.getElementById('title');
            const msg = document.getElementById('message');
            const btn = document.getElementById('actionBtn');
            const container = document.getElementById('statusContent');

            spinner.style.display = 'none';

            if (isSuccess) {
                check.style.display = 'block';
                title.textContent = 'Authenticated!';
                msg.textContent = message || 'Your account has been successfully verified. You can now return to the app.';
                btn.style.display = 'inline-block';
                container.classList.add('success');
            } else {
                cross.style.display = 'block';
                title.textContent = 'Authentication Failed';
                msg.textContent = message || 'Something went wrong during authentication.';
                btn.textContent = 'Back to App';
                btn.style.display = 'inline-block';
                container.classList.add('error');
            }
        }

        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error_description') || params.get('error');

            if (error) {
                updateUI(false, error);
            } else {
                updateUI(true);

                // Auto redirect attempt (mobile deep link)
                setTimeout(() => {
                    window.location.href = "pressup://auth-callback";
                }, 1200);
            }
        };
    </script>

</body>

</html>
