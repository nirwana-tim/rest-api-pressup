<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Success • PressUp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            margin: 0;
            padding: 0;
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: #1f2a44;
            line-height: 1.6;
        }

        .outer {
            width: 100%;
            padding: 40px 20px;
            background: #f8fafc;
            text-align: center
        }

        .card {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .08)
        }

        .header {
            background: #2dd4c0;
            padding: 32px 24px
        }

        .header img {
            width: 80px;
            height: auto;
            display: block;
            margin: 0 auto 12px
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: .5px;
            margin: 0
        }

        .content {
            padding: 40px 32px
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .icon {
            width: 100%;
            height: 100%
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 16px
        }

        p {
            font-size: 16px;
            color: #334155;
            margin: 0 0 28px
        }

        .btn {
            display: inline-block;
            background: #1f2a44;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 48px;
            border-radius: 8px;
            min-width: 220px;
            transition: background .2s
        }

        .btn:hover {
            background: #0f172a
        }

        .footer {
            background: #f1f5f9;
            padding: 24px;
            font-size: 13px;
            color: #64748b
        }

        @media (max-width:500px) {
            .card {
                border-radius: 0
            }

            .content {
                padding: 32px 20px
            }

            .btn {
                min-width: 100%;
                padding: 16px 24px
            }
        }
    </style>
</head>

<body>

    <div class="outer">
        <div class="card">
            <div class="header">
                <img src="email/icon.webp" alt="PressUp Logo">
                <h1>PressUp</h1>
            </div>

            <div class="content" id="status">
                <div class="icon-wrap">
                    <svg class="icon spinner" id="spinner" viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="20" fill="none" stroke="#2dd4c0" stroke-width="5"
                            stroke-dasharray="31.4 31.4" stroke-linecap="round">
                            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25"
                                dur="1s" repeatCount="indefinite" />
                        </circle>
                    </svg>
                    <svg class="icon" id="check" style="display:none" viewBox="0 0 24 24" fill="none" stroke="#10b981"
                        stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </div>

                <h2 id="title">Authenticating...</h2>
                <p id="msg">Please wait a moment...</p>

                <a href="pressup://auth-callback" class="btn" id="btn" style="display:none">Open PressUp App</a>
            </div>

            <div class="footer">
                © 2026 PressUp. All rights reserved.<br>Karawang, Indonesia
            </div>
        </div>
    </div>

    <script>
        window.onload = () => { const s = document.getElementById("spinner"), c = document.getElementById("check"), t = document.getElementById("title"), m = document.getElementById("msg"), b = document.getElementById("btn"); setTimeout(() => { s.style.display = "none"; c.style.display = "block"; t.textContent = "Authenticated!"; m.textContent = "Your account has been successfully verified. Returning you to the app..."; b.style.display = "inline-block"; setTimeout(() => { window.location.href = "pressup://auth-callback" }, 1800) }, 600) }
    </script>

</body>

</html>
